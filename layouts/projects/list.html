{{ define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
</header>

<div class="project-grid">
  {{ range .Pages.ByDate.Reverse }}
  <a class="project-card" href="{{ .Permalink }}">
    <div class="project-card-top">
      <span class="project-title">{{ .Title }}</span>
      <span class="project-status status-{{ .Params.status | default "unknown" | urlize }}">
        {{ .Params.status | default "Unknown" }}
      </span>
    </div>
    <p class="project-summary">{{ .Params.summary | default .Summary }}</p>
    {{ with .Params.stack }}
    <div class="project-stack">
      {{ range . }}
      <span class="stack-pill">{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}
  </a>
  {{ end }}
</div>
{{ end }}
