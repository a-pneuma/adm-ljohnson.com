  <span id="uptime-counter">Calculating uptime…</span>
</div>

<script>
(function() {
  var launchDate = new Date("2026-06-23T23:18:17Z");
  var el = document.getElementById("uptime-counter");
  function updateUptime() {
    var diffMs = new Date() - launchDate;
    var totalMinutes = Math.floor(diffMs / 60000);
    var days = Math.floor(totalMinutes / 1440);
    var hours = Math.floor((totalMinutes % 1440) / 60);
    var minutes = totalMinutes % 60;
    el.textContent = "Up for " + days + "d " + hours + "h " + minutes + "m";
  }
  updateUptime();
  setInterval(updateUptime, 60000);
})();
</script>
