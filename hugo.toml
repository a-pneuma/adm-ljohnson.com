baseURL = "https://ljohnson-adm.com/"
locale = "en-us"
title = "Landon Johnson"
theme = "PaperMod"

[params]
  description = "Notes on Windows Server, Linux, M365, Azure, networking, and homelab projects."
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  defaultTheme = "dark"
  disableSpecial1stPost = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false

[params.footer]
  text = "· Served by Caddy on Debian 13 · [Source on GitHub](https://github.com/a-pneuma/adm-ljohnson.com)"

[params.assets]
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon-16x16.png"
  favicon32x32 = "/favicon-32x32.png"
  apple_touch_icon = "/apple-touch-icon.png"

[params.label]
  text = "Landon Johnson"
  icon = "/images/logo.svg"
  iconHeight = 36

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 1

[[menu.main]]
  name = "Projects"
  url = "/projects/"
  weight = 2

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 3

[taxonomies]
  tag = "tags"
  category = "categories"
